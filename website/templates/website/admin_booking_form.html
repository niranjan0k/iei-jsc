{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Add Booking – Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;background:#f5f6fa}.topbar{background:#1a3a6e;color:#fff;padding:14px 32px;display:flex;justify-content:space-between;align-items:center}.topbar h4{margin:0;color:#c9a84c;font-weight:700}.topbar a{color:#fff;text-decoration:none}.content{padding:32px;max-width:740px}.form-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:28px}</style>
</head>
<body>
<div class="topbar">
  <h4><i class="bi bi-calendar-plus me-2"></i>Add Guest Booking</h4>
  <a href="{% url 'admin_guesthouse' %}"><i class="bi bi-arrow-left me-1"></i>Back to Guest House</a>
</div>
<div class="content">
  {% if messages %}{% for m in messages %}<div class="alert alert-danger">{{ m }}</div>{% endfor %}{% endif %}
  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-600">Room *</label>
        <select name="room" class="form-select" required>
          <option value="">— Select Room —</option>
          {% for room in rooms %}<option value="{{ room.pk }}">Room {{ room.room_number }} — {{ room.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-600">Guest Name *</label>
          <input type="text" name="guest_name" class="form-control" placeholder="Full name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-600">Contact Number *</label>
          <input type="text" name="contact_number" class="form-control" placeholder="Phone number" required>
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label fw-600">Check-In Date *</label>
          <input type="date" name="check_in" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-600">Check-Out Date *</label>
          <input type="date" name="check_out" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-600">Number of Guests</label>
          <select name="num_people" class="form-select">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
          </select>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600">Notes</label>
        <textarea name="notes" class="form-control" rows="3" placeholder="Any special requirements..."></textarea>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn" style="background:#c9a84c;color:#0e1a3a;font-weight:700"><i class="bi bi-check-lg me-2"></i>Save Booking</button>
        <a href="{% url 'admin_guesthouse' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
