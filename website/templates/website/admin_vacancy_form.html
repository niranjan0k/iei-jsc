{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Post Vacancy – Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;background:#f5f6fa}.topbar{background:#1a3a6e;color:#fff;padding:14px 32px;display:flex;justify-content:space-between;align-items:center}.topbar h4{margin:0;color:#c9a84c;font-weight:700}.topbar a{color:#fff;text-decoration:none}.content{padding:32px;max-width:740px}.form-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:28px}</style>
</head>
<body>
<div class="topbar">
  <h4><i class="bi bi-plus-circle me-2"></i>Post New Vacancy</h4>
  <a href="{% url 'admin_vacancies' %}"><i class="bi bi-arrow-left me-1"></i>Back to Vacancies</a>
</div>
<div class="content">
  {% if messages %}{% for m in messages %}<div class="alert alert-danger">{{ m }}</div>{% endfor %}{% endif %}
  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-600">Job Title *</label>
        <input type="text" name="title" class="form-control" placeholder="e.g., Junior Engineer" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-600">Department</label>
        <input type="text" name="department" class="form-control" placeholder="e.g., Technical, Administration">
      </div>
      <div class="mb-3">
        <label class="form-label fw-600">Job Description *</label>
        <textarea name="description" class="form-control" rows="5" placeholder="Describe the role, responsibilities..." required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label fw-600">Qualifications Required</label>
        <textarea name="qualifications" class="form-control" rows="3" placeholder="Educational qualifications, experience..."></textarea>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600">Application Last Date</label>
        <input type="date" name="last_date" class="form-control">
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn" style="background:#c9a84c;color:#0e1a3a;font-weight:700"><i class="bi bi-check-lg me-2"></i>Post Vacancy</button>
        <a href="{% url 'admin_vacancies' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
